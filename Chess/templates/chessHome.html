<!doctype html>
<html lang="en">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess - Home</title>
  </head>

  <body>
    <main class="home-container">
      <section class="home-left">
        <div class="home-kicker">Play against the engine</div>

        <h1 class="home-title" data-text="Chess">Chess</h1>

        <p class="home-subtitle">
          Make your move, test your strategy, and challenge the engine in a clean,
          modern chess interface.
        </p>

        <a href="/game" class="start-button">Start playing</a>
      </section>

      <section class="home-right">
        <div class="preview-card">
          <div class="preview-board">
            <!-- Row 8 -->
            <div class="square light"></div>
            <div class="square dark"></div>
            <div class="square light">
              <img src="/static/pieces/bb.svg" class="piece" alt="Black bishop" />
            </div>
            <div class="square dark"></div>
            <div class="square light">
              <img src="/static/pieces/bk.svg" class="piece" alt="Black king" />
            </div>
            <div class="square dark"></div>
            <div class="square light"></div>
            <div class="square dark">
              <img src="/static/pieces/br.svg" class="piece" alt="Black rook" />
            </div>

            <!-- Row 7 -->
            <div class="square dark"></div>
            <div class="square light">
              <img src="/static/pieces/bp.svg" class="piece" alt="Black pawn" />
            </div>
            <div class="square dark"></div>
            <div class="square light">
              <img src="/static/pieces/bq.svg" class="piece" alt="Black queen" />
            </div>
            <div class="square dark"></div>
            <div class="square light"></div>
            <div class="square dark">
              <img src="/static/pieces/bp.svg" class="piece" alt="Black pawn" />
            </div>
            <div class="square light"></div>

            <!-- Row 6 -->
            <div class="square light"></div>
            <div class="square dark"></div>
            <div class="square light"></div>
            <div class="square dark">
              <img src="/static/pieces/bn.svg" class="piece" alt="Black knight" />
            </div>
            <div class="square light"></div>
            <div class="square dark"></div>
            <div class="square light"></div>
            <div class="square dark"></div>

            <!-- Row 5 -->
            <div class="square dark"></div>
            <div class="square light"></div>
            <div class="square dark">
              <img src="/static/pieces/wp.svg" class="piece" alt="White pawn" />
            </div>
            <div class="square light"></div>
            <div class="square dark"></div>
            <div class="square light">
              <img src="/static/pieces/wp.svg" class="piece" alt="White pawn" />
            </div>
            <div class="square dark"></div>
            <div class="square light"></div>

            <!-- Row 4 -->
            <div class="square light"></div>
            <div class="square dark"></div>
            <div class="square light"></div>
            <div class="square dark">
              <img src="/static/pieces/wq.svg" class="piece" alt="White queen" />
            </div>
            <div class="square light"></div>
            <div class="square dark"></div>
            <div class="square light"></div>
            <div class="square dark"></div>

            <!-- Row 3 -->
            <div class="square dark"></div>
            <div class="square light"></div>
            <div class="square dark"></div>
            <div class="square light"></div>
            <div class="square dark">
              <img src="/static/pieces/wn.svg" class="piece" alt="White knight" />
            </div>
            <div class="square light"></div>
            <div class="square dark"></div>
            <div class="square light"></div>

            <!-- Row 2 -->
            <div class="square light"></div>
            <div class="square dark">
              <img src="/static/pieces/wp.svg" class="piece" alt="White pawn" />
            </div>
            <div class="square light"></div>
            <div class="square dark"></div>
            <div class="square light"></div>
            <div class="square dark">
              <img src="/static/pieces/wb.svg" class="piece" alt="White bishop" />
            </div>
            <div class="square light"></div>
            <div class="square dark"></div>

            <!-- Row 1 -->
            <div class="square dark">
              <img src="/static/pieces/wr.svg" class="piece" alt="White rook" />
            </div>
            <div class="square light"></div>
            <div class="square dark"></div>
            <div class="square light"></div>
            <div class="square dark">
              <img src="/static/pieces/wk.svg" class="piece" alt="White king" />
            </div>
            <div class="square light"></div>
            <div class="square dark"></div>
            <div class="square light"></div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
